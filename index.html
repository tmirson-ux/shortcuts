<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Homepage</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="logo-area">
      <div class="logo-placeholder"></div>
      <span class="wordmark">Home</span>
    </div>
    <div class="search-container">
      <input type="search" class="search-box" placeholder="Search the web" aria-label="Search the web">
    </div>
  </header>

  <main class="main-content">
    <section class="shortcuts-section" id="shortcuts-section">
      <div class="shortcuts-grid-wrapper">
        <div class="shortcuts-grid-container">
          <div class="shortcuts-grid" id="shortcuts-grid"></div>
          <div class="drop-indicator" id="shortcuts-drop-indicator" aria-hidden="true"></div>
        </div>
      </div>
      <div class="shortcut-expanded-preview" id="shortcut-expanded-preview" aria-hidden="true"></div>
    </section>

    <section class="resume-section" id="resume-section" aria-label="Resume your tasks" hidden>
      <div class="resume-section-header">
        <h2 class="resume-section-title">Resume your tasks</h2>
        <div class="resume-tabs" role="tablist" aria-label="Task source">
          <button type="button" class="resume-tab resume-tab--active" role="tab" aria-selected="true" aria-controls="resume-panel-history" id="resume-tab-history" data-source="history" aria-label="History" title="History"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></button>
          <button type="button" class="resume-tab" role="tab" aria-selected="false" aria-controls="resume-panel-tabs" id="resume-tab-tabs" data-source="tabs" aria-label="Tabs" title="Tabs"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg></button>
          <button type="button" class="resume-tab" role="tab" aria-selected="false" aria-controls="resume-panel-bookmarks" id="resume-tab-bookmarks" data-source="bookmarks" aria-label="Bookmarks" title="Bookmarks"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></button>
        </div>
      </div>
      <div class="resume-panels">
        <div class="resume-panel resume-panel--active" id="resume-panel-history" role="tabpanel" aria-labelledby="resume-tab-history"></div>
        <div class="resume-panel" id="resume-panel-tabs" role="tabpanel" aria-labelledby="resume-tab-tabs" hidden></div>
        <div class="resume-panel" id="resume-panel-bookmarks" role="tabpanel" aria-labelledby="resume-tab-bookmarks" hidden></div>
      </div>
    </section>

    <section class="content-cards-section" id="content-cards-section">
      <div id="content-cards">
        <!-- Content blocks (topic + grid) rendered by app.js -->
      </div>
    </section>
  </main>

  <div class="customization-panel-overlay" id="customization-panel-overlay" aria-hidden="true"></div>
  <aside class="customization-panel" id="customization-panel" aria-label="Shortcut customization">
    <div class="customization-panel-header">
      <button type="button" class="customization-panel-close" id="customization-panel-close" aria-label="Close">×</button>
    </div>
    <div class="customization-panel-body">
      <div class="customization-field">
        <label class="customization-label">Appearance</label>
        <div class="customization-wallpaper-grid">
          <button type="button" class="customization-wallpaper-tile customization-wallpaper-tile--upload" id="change-wallpaper-btn">
            <span class="customization-wallpaper-upload-icon">+</span>
            <span class="customization-wallpaper-upload-label">Upload</span>
          </button>
          <button type="button" class="customization-wallpaper-tile" data-wallpaper="nature" style="background:linear-gradient(135deg,#2d5a27,#1a3d16)"></button>
          <button type="button" class="customization-wallpaper-tile" data-wallpaper="ocean" style="background:linear-gradient(135deg,#1e3a5f,#0d1f33)"></button>
          <button type="button" class="customization-wallpaper-tile" data-wallpaper="sunset" style="background:linear-gradient(135deg,#8b4513,#ff6b35)"></button>
          <button type="button" class="customization-wallpaper-tile" data-wallpaper="minimal" style="background:linear-gradient(135deg,#4a4a4a,#2d2d2d)"></button>
          <button type="button" class="customization-wallpaper-tile" data-wallpaper="abstract" style="background:linear-gradient(135deg,#4c1d95,#7c3aed)"></button>
        </div>
      </div>
      <div class="customization-divider"></div>
      <div class="customization-field">
        <label class="customization-label">Shortcuts</label>
        <label class="customization-toggle">
          <input type="checkbox" id="show-shortcuts-toggle" checked>
          <span class="customization-toggle-slider"></span>
          Shortcuts
        </label>
      </div>
      <div class="customization-field" id="shortcuts-rows-field">
        <label class="customization-label" for="shortcuts-rows-select">Rows shown by default</label>
        <select id="shortcuts-rows-select" class="customization-select" aria-label="Number of rows">
          <option value="1" selected>1 row</option>
          <option value="2">2 rows</option>
          <option value="3">3 rows</option>
          <option value="4">4 rows</option>
        </select>
      </div>
      <div class="customization-field">
        <label class="customization-label">View</label>
        <div class="customization-view-toggle" role="radiogroup" aria-label="View mode">
          <label class="customization-view-option">
            <input type="radio" name="tileView" value="list"> List
          </label>
          <label class="customization-view-option">
            <input type="radio" name="tileView" value="grid" checked> Grid
          </label>
        </div>
      </div>
      <div class="customization-field customization-field--grid-size" id="grid-size-field">
        <label class="customization-label">Tile size</label>
        <div class="customization-view-toggle" role="radiogroup" aria-label="Tile size">
          <label class="customization-view-option">
            <input type="radio" name="tileSize" value="small"> Small
          </label>
          <label class="customization-view-option">
            <input type="radio" name="tileSize" value="default" checked> Default
          </label>
          <label class="customization-view-option">
            <input type="radio" name="tileSize" value="large"> Large
          </label>
        </div>
      </div>
      <div class="customization-field" id="show-labels-field">
        <label class="customization-toggle">
          <input type="checkbox" id="show-labels-toggle" checked>
          <span class="customization-toggle-slider"></span>
          Labels
        </label>
      </div>
      <div class="customization-divider"></div>
      <div class="customization-field" id="show-resume-field">
        <label class="customization-toggle">
          <input type="checkbox" id="show-resume-toggle">
          <span class="customization-toggle-slider"></span>
          Resume your tasks
        </label>
      </div>
      <div class="customization-field">
        <label class="customization-toggle">
          <input type="checkbox" id="show-stories-toggle" checked>
          <span class="customization-toggle-slider"></span>
          Stories
        </label>
      </div>
      <div class="customization-field">
        <label class="customization-toggle">
          <input type="checkbox" id="show-widgets-toggle">
          <span class="customization-toggle-slider"></span>
          Widgets
        </label>
      </div>
      <div class="customization-field">
        <button type="button" class="customization-action-btn customization-action-btn--left" id="manage-topics-btn">
          <span class="customization-action-icon">✨</span>
          <span class="customization-action-text">Manage your topic</span>
        </button>
      </div>
    </div>
  </aside>

  <button type="button" class="customize-fab" id="customize-fab" aria-label="Customize" title="Customize">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
    <span class="customize-fab-label">Customize</span>
  </button>

  <script src="app.js"></script>
</body>
</html>
